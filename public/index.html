<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>🎲 3D Domino 101</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="/socket.io/socket.io.js"></script>
<style>
:root {
  --bg: #0a0a0f;
  --felt: #0d3320;
  --felt2: #0a2818;
  --gold: #c9a84c;
  --gold2: #f0d080;
  --tile-bg: #f5f0e8;
  --tile-border: #2c1a0e;
  --dot-dark: #1a0a00;
  --dot-light: #fff8f0;
  --red: #e74c3c;
  --blue: #3498db;
  --green: #2ecc71;
  --panel: rgba(10,15,10,0.92);
  --chat-bg: rgba(5,15,10,0.97);
  --text: #e8dfc8;
  --accent: #c9a84c;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  font-family: 'Rajdhani', sans-serif;
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ─── LOGIN SCREEN ─────────────────────────────────── */
#loginScreen {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, #0f2010 0%, #050a05 70%);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  transition: opacity .5s, transform .5s;
}
#loginScreen.hide { opacity:0; pointer-events:none; transform: scale(1.05); }

.login-box {
  background: linear-gradient(145deg, #0a1a0a, #050d05);
  border: 1px solid var(--gold);
  border-radius: 20px;
  padding: 50px 60px;
  width: 420px;
  box-shadow: 0 0 60px rgba(201,168,76,.15), inset 0 1px 0 rgba(201,168,76,.1);
  text-align: center;
}

.login-box h1 {
  font-family: 'Cinzel Decorative', serif;
  color: var(--gold);
  font-size: 2.2rem;
  margin-bottom: 6px;
  text-shadow: 0 0 20px rgba(201,168,76,.4);
}
.login-box .subtitle { color: #7a9a7a; font-size: .95rem; margin-bottom: 36px; }

.login-box input, .login-box select {
  width: 100%;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(201,168,76,.3);
  border-radius: 10px;
  padding: 14px 18px;
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.05rem;
  margin-bottom: 16px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.login-box input:focus { border-color: var(--gold); box-shadow: 0 0 12px rgba(201,168,76,.2); }

.btn-gold {
  width: 100%; padding: 16px;
  background: linear-gradient(135deg, #c9a84c, #9a7030);
  border: none; border-radius: 12px;
  color: #0a0a0f; font-family: 'Cinzel Decorative', serif;
  font-size: 1rem; font-weight: 900; letter-spacing: .05em;
  cursor: pointer;
  transition: all .2s;
  box-shadow: 0 4px 20px rgba(201,168,76,.3);
}
.btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,.5); }
.btn-gold:active { transform: translateY(0); }

/* ─── MAIN LAYOUT ───────────────────────────────────── */
#app {
  display: grid;
  grid-template-columns: 1fr 320px;
  grid-template-rows: 60px 1fr 200px;
  height: 100vh;
  gap: 0;
}

/* ─── HEADER ────────────────────────────────────────── */
header {
  grid-column: 1/-1;
  background: linear-gradient(90deg, #050d05, #0a1a0a, #050d05);
  border-bottom: 1px solid rgba(201,168,76,.3);
  display: flex; align-items: center; padding: 0 20px;
  gap: 16px;
  box-shadow: 0 2px 20px rgba(0,0,0,.5);
}
header h2 {
  font-family: 'Cinzel Decorative', serif;
  color: var(--gold); font-size: 1.2rem;
  text-shadow: 0 0 15px rgba(201,168,76,.4);
  flex:1;
}
.header-info { display:flex; gap:16px; align-items:center; }
.turn-badge {
  background: rgba(201,168,76,.15);
  border: 1px solid rgba(201,168,76,.4);
  border-radius: 8px; padding: 4px 14px;
  font-size: .85rem; color: var(--gold);
  display: flex; align-items: center; gap: 8px;
}
.turn-badge .dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.7)} }

.round-badge {
  background: rgba(52,152,219,.15);
  border: 1px solid rgba(52,152,219,.4);
  border-radius: 8px; padding: 4px 14px;
  font-size: .85rem; color: #5dade2;
}

#btnStart {
  background: linear-gradient(135deg, #2ecc71, #1a8a48);
  border: none; border-radius: 8px; padding: 8px 20px;
  color: #fff; font-family: 'Rajdhani'; font-weight:700;
  font-size: .95rem; cursor:pointer; transition: all .2s;
  display: flex; align-items:center; gap:6px;
}
#btnStart:hover { transform:scale(1.05); box-shadow:0 4px 15px rgba(46,204,113,.4); }

/* ─── BOARD ─────────────────────────────────────────── */
#boardArea {
  background:
    radial-gradient(ellipse at center, #0f3825 0%, #082018 60%, #041010 100%);
  position: relative; overflow: auto;
  display: flex; align-items: center; justify-content: flex-start;
  padding: 30px;
  cursor: default;
}

/* felt texture */
#boardArea::before {
  content:''; position:absolute; inset:0;
  background-image:
    repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(0,0,0,.05) 2px, rgba(0,0,0,.05) 4px);
  pointer-events:none;
}

/* board border glow */
#boardInner {
  min-width: 200px; min-height: 100px;
  display: flex; align-items: center;
  gap: 4px;
  padding: 20px;
  border-radius: 16px;
  position: relative;
  flex-wrap: nowrap;
}

/* ─── DOMINO TILE 3D ────────────────────────────────── */
.domino {
  position: relative;
  display: inline-flex;
  flex-direction: column;
  cursor: pointer;
  transition: transform .15s ease, filter .15s;
  transform-style: preserve-3d;
  margin: 3px;
  flex-shrink: 0;
}

.domino:hover { transform: translateY(-8px) rotateX(8deg) scale(1.08); filter: brightness(1.15); z-index:10; }
.domino:active { transform: translateY(-2px) scale(.97); }

.domino.selected { transform: translateY(-14px) rotateX(10deg) scale(1.12); filter: brightness(1.3) drop-shadow(0 0 12px gold); z-index:20; }
.domino.unplayable { opacity:.5; cursor:not-allowed; }
.domino.unplayable:hover { transform: none; filter: none; }

.domino .face {
  width: 44px; height: 44px;
  background: linear-gradient(145deg, #f8f3e8, #e8e0d0);
  border-radius: 6px 6px 0 0;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  box-shadow: inset 0 1px 2px rgba(255,255,255,.8), inset 0 -1px 2px rgba(0,0,0,.15);
}
.domino .face:last-child { border-radius: 0 0 6px 6px; border-top: 1.5px solid rgba(0,0,0,.2); }

.domino .tile-body {
  display: flex;
  flex-direction: column;
  background: linear-gradient(145deg, #f5efe0, #e0d8c8);
  border: 2.5px solid #3a2010;
  border-radius: 8px;
  box-shadow:
    4px 6px 0 #2c1a08,
    4px 6px 12px rgba(0,0,0,.7),
    inset 0 1px 0 rgba(255,255,255,.5),
    inset 0 -1px 0 rgba(0,0,0,.1);
  overflow: hidden;
  transform: perspective(200px) rotateX(2deg);
}

/* Divider line */
.domino .tile-body::after {
  content:''; position:absolute; left:6px; right:6px;
  top:50%; height:1.5px;
  background: rgba(60,30,10,.4);
  transform: translateY(-50%);
  pointer-events:none;
}
.domino { position:relative; }

/* Dot grid */
.dots {
  width: 44px; height: 44px;
  display: grid;
  place-items: center;
}

.dot {
  width: 7px; height: 7px;
  background: radial-gradient(circle at 35% 35%, #4a2010, #1a0800);
  border-radius: 50%;
  box-shadow: inset 0 1px 2px rgba(0,0,0,.5), 0 .5px 1px rgba(255,255,255,.1);
}

/* Horizontal domino (on board) */
.domino.horizontal .tile-body { flex-direction: row; }
.domino.horizontal .face { border-radius: 6px 0 0 6px; }
.domino.horizontal .face:last-child { border-radius: 0 6px 6px 0; border-top: none; border-left: 1.5px solid rgba(0,0,0,.2); }

/* Board tile - bigger */
.domino.on-board .face { width: 48px; height: 48px; }
.domino.on-board .dots { width: 48px; height: 48px; }
.domino.on-board:hover { transform: translateY(-5px) rotateX(5deg) scale(1.05); }

/* ─── RIGHT PANEL ────────────────────────────────────── */
#rightPanel {
  grid-row: 2/4;
  display: flex; flex-direction: column;
  background: var(--panel);
  border-left: 1px solid rgba(201,168,76,.2);
}

/* Players list */
#playersList {
  padding: 16px;
  border-bottom: 1px solid rgba(201,168,76,.15);
}
#playersList h3 { font-size:.8rem; text-transform:uppercase; letter-spacing:.1em; color:#6a8a6a; margin-bottom:12px; display:flex; align-items:center; gap:6px; }

.player-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 10px; margin-bottom: 6px;
  background: rgba(255,255,255,.03);
  border: 1px solid transparent;
  transition: all .2s;
}
.player-item.active-turn {
  background: rgba(201,168,76,.08);
  border-color: rgba(201,168,76,.3);
  box-shadow: 0 0 15px rgba(201,168,76,.1);
}
.player-item.me { border-color: rgba(52,152,219,.25); }

.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items:center; justify-content:center;
  font-weight: 900; font-size: 1rem; color: #fff;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,.4);
  border: 2px solid rgba(255,255,255,.2);
}

.player-info { flex:1; min-width:0; }
.player-name { font-weight:700; font-size:.95rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.player-score { font-size:.78rem; color:#8aaa8a; }

.hand-count {
  background: rgba(201,168,76,.15);
  border: 1px solid rgba(201,168,76,.3);
  border-radius: 6px; padding: 2px 8px;
  font-size: .8rem; color: var(--gold);
  font-weight: 700;
}
.hand-count i { margin-right:3px; font-size:.7rem; }

/* Scores */
#scoreBoard { padding: 12px 16px; border-bottom: 1px solid rgba(201,168,76,.1); }
#scoreBoard h3 { font-size:.8rem; text-transform:uppercase; letter-spacing:.1em; color:#6a8a6a; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.score-row { display:flex; justify-content:space-between; font-size:.9rem; padding:3px 0; }
.score-val { color: var(--gold); font-weight:700; }

/* ─── CHAT ───────────────────────────────────────────── */
#chatPanel {
  flex:1; display:flex; flex-direction:column; overflow:hidden;
  background: var(--chat-bg);
}
#chatPanel h3 { font-size:.8rem; text-transform:uppercase; letter-spacing:.1em; color:#6a8a6a; padding:12px 16px 8px; display:flex; align-items:center; gap:6px; border-bottom:1px solid rgba(255,255,255,.05); }

#chatMessages {
  flex:1; overflow-y:auto; padding:12px;
  display:flex; flex-direction:column; gap:6px;
  scrollbar-width:thin; scrollbar-color: #2a3a2a transparent;
}
#chatMessages::-webkit-scrollbar { width:4px; }
#chatMessages::-webkit-scrollbar-thumb { background:#2a3a2a; border-radius:2px; }

.chat-msg {
  display:flex; align-items:flex-start; gap:8px;
  animation: msgIn .25s ease;
}
@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

.chat-msg.system { justify-content:center; }
.chat-msg.system .sys-text {
  font-size:.78rem; color:#4a6a4a;
  padding:3px 10px; background:rgba(255,255,255,.03);
  border-radius:10px; text-align:center;
}

.chat-msg.mine { flex-direction:row-reverse; }

.msg-avatar { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.75rem; font-weight:900; flex-shrink:0; margin-top:2px; }
.msg-bubble {
  max-width:80%; background:rgba(255,255,255,.07);
  border-radius:12px 12px 12px 4px; padding:7px 12px;
  font-size:.88rem; line-height:1.4;
}
.chat-msg.mine .msg-bubble { background:rgba(201,168,76,.12); border-radius:12px 12px 4px 12px; }
.msg-name { font-size:.72rem; font-weight:700; margin-bottom:3px; opacity:.7; }

#chatInput {
  display:flex; gap:0; border-top:1px solid rgba(255,255,255,.05); padding:10px;
  gap:8px;
}
#chatInput input {
  flex:1; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  border-radius:8px; padding:10px 14px; color:var(--text);
  font-family:'Rajdhani'; font-size:.95rem; outline:none;
  transition:border-color .2s;
}
#chatInput input:focus { border-color:rgba(201,168,76,.4); }
#chatInput button {
  background:rgba(201,168,76,.2); border:1px solid rgba(201,168,76,.3);
  border-radius:8px; width:40px; color:var(--gold); font-size:1rem;
  cursor:pointer; transition:all .2s;
}
#chatInput button:hover { background:rgba(201,168,76,.35); }

/* ─── BOTTOM HAND AREA ──────────────────────────────── */
#handArea {
  background: linear-gradient(0deg, #050d08, #0a1810);
  border-top: 1px solid rgba(201,168,76,.2);
  padding: 16px 20px;
  display: flex; align-items: center; gap: 12px;
  overflow-x: auto; overflow-y: visible;
  min-height: 140px;
  position: relative;
  box-shadow: 0 -4px 30px rgba(0,0,0,.5);
}
#handArea::before {
  content:'ELLERIM'; position:absolute; left:16px; top:8px;
  font-size:.65rem; letter-spacing:.15em; color:#3a5a3a; font-weight:700;
}

#handTiles {
  display:flex; align-items:center; gap:6px; padding-top:10px;
  flex-shrink:0;
}

/* Boneyard button */
#boneyardBtn {
  flex-shrink:0; margin-left:auto;
  background: linear-gradient(135deg, #1a3a2a, #0d2018);
  border: 2px solid rgba(201,168,76,.4); border-radius:12px;
  padding: 12px 20px; cursor:pointer; transition:all .2s;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  color:var(--text);
}
#boneyardBtn:hover { border-color:var(--gold); transform:scale(1.05); box-shadow:0 4px 20px rgba(201,168,76,.2); }
#boneyardBtn:disabled { opacity:.4; cursor:not-allowed; transform:none; }
#boneyardBtn .boneyard-icon {
  font-size:1.8rem;
  display:flex; gap:3px;
}
.mini-tile {
  width:12px; height:20px;
  background:linear-gradient(145deg,#f5f0e0,#e0d8c8);
  border-radius:2px; border:1px solid #3a2010;
  box-shadow:2px 2px 0 #2c1a08;
  display:inline-block;
}

#boneyardCount {
  font-size:.8rem; color:#8aaa8a;
  background:rgba(201,168,76,.1); border-radius:6px; padding:2px 10px;
}

/* ─── NOTIFICATIONS ─────────────────────────────────── */
#notifications {
  position:fixed; top:70px; right:340px;
  display:flex; flex-direction:column; gap:8px;
  z-index:999; pointer-events:none;
  align-items:flex-end;
}
.notif {
  background:rgba(10,20,10,.95);
  border:1px solid rgba(201,168,76,.4);
  border-radius:10px; padding:10px 18px;
  font-size:.9rem; color:var(--text);
  animation: notifIn .3s ease, notifOut .3s ease 2.5s forwards;
  box-shadow: 0 4px 20px rgba(0,0,0,.5);
  display:flex; align-items:center; gap:8px;
}
@keyframes notifIn { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:none} }
@keyframes notifOut { to{opacity:0;transform:translateX(30px)} }

/* ─── EFFECTS ───────────────────────────────────────── */
.tile-fly {
  position:fixed; pointer-events:none; z-index:9999;
  animation: tileFlyin .5s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes tileFlyin {
  from { transform: scale(0) rotate(-20deg) translateY(30px); opacity:0; }
  60%  { transform: scale(1.2) rotate(5deg); opacity:1; }
  to   { transform: scale(1) rotate(0); opacity:1; }
}

.tile-place-effect {
  position:absolute; pointer-events:none; z-index:100;
  width:80px; height:80px; border-radius:50%;
  background: radial-gradient(circle, rgba(201,168,76,.6), transparent 70%);
  animation: placeEffect .4s ease forwards;
}
@keyframes placeEffect {
  from { transform:scale(0); opacity:1; }
  to   { transform:scale(2.5); opacity:0; }
}

.draw-effect {
  animation: drawBounce .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes drawBounce {
  from { transform:scale(0) translateY(-20px); opacity:0; }
  to   { transform:scale(1) translateY(0); opacity:1; }
}

/* Win overlay */
#winOverlay {
  position:fixed; inset:0; z-index:2000;
  background:rgba(0,0,0,.8);
  display:none; align-items:center; justify-content:center;
  backdrop-filter:blur(6px);
}
#winOverlay.show { display:flex; }
.win-box {
  background:linear-gradient(145deg,#0a2010,#050d05);
  border:2px solid var(--gold);
  border-radius:24px; padding:50px 60px; text-align:center;
  box-shadow:0 0 80px rgba(201,168,76,.3);
  animation: winIn .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes winIn { from{transform:scale(.5) rotate(-5deg);opacity:0} to{transform:none;opacity:1} }
.win-box h2 { font-family:'Cinzel Decorative',serif; font-size:2.5rem; color:var(--gold); margin-bottom:10px; }
.win-box p { color:#8aaa8a; font-size:1.1rem; margin-bottom:24px; }
.win-scores { margin:20px 0; }
.win-score-row { display:flex; justify-content:space-between; padding:6px 0; font-size:1rem; border-bottom:1px solid rgba(255,255,255,.05); gap:30px; }
.win-score-row .wscore { color:var(--gold); font-weight:700; font-size:1.1rem; }

/* Confetti */
.confetti-piece {
  position:fixed; width:10px; height:14px; top:-20px;
  animation: confettiFall linear forwards;
  z-index:3000; pointer-events:none; border-radius:2px;
}
@keyframes confettiFall {
  to { transform: translateY(110vh) rotate(720deg); opacity:0; }
}

/* Scrollbar for board */
#boardArea::-webkit-scrollbar { height:6px; width:6px; }
#boardArea::-webkit-scrollbar-track { background:transparent; }
#boardArea::-webkit-scrollbar-thumb { background:#1a3a2a; border-radius:3px; }

/* Side selection modal */
#sideModal {
  position:fixed; inset:0; z-index:1500;
  background:rgba(0,0,0,.7); backdrop-filter:blur(4px);
  display:none; align-items:center; justify-content:center;
}
#sideModal.show { display:flex; }
.side-box {
  background:#0a1a0a; border:1px solid var(--gold); border-radius:16px;
  padding:30px 40px; text-align:center;
  animation: winIn .3s ease;
}
.side-box h3 { color:var(--gold); font-size:1.2rem; margin-bottom:20px; }
.side-btns { display:flex; gap:12px; }
.side-btn {
  padding:12px 28px; border-radius:10px; cursor:pointer;
  font-family:'Rajdhani'; font-weight:700; font-size:1rem;
  border:none; transition:all .2s;
}
.side-btn.left  { background:rgba(52,152,219,.2); border:1px solid #3498db; color:#5dade2; }
.side-btn.right { background:rgba(46,204,113,.2); border:1px solid #2ecc71; color:#58d68d; }
.side-btn.auto  { background:rgba(201,168,76,.15); border:1px solid var(--gold); color:var(--gold); }
.side-btn:hover { transform:scale(1.05); filter:brightness(1.3); }

/* my turn glow on hand */
#handArea.my-turn { box-shadow: 0 -4px 30px rgba(201,168,76,.25), inset 0 0 40px rgba(201,168,76,.05); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h1>🎲 Domino 101</h1>
    <p class="subtitle">Gerçek zamanlı 3D Domino — Rakiplerini Yen!</p>
    <input id="nameInput" type="text" placeholder="İsminiz..." maxlength="20" autocomplete="off"/>
    <input id="roomInput" type="text" placeholder="Oda Adı (örn: oda1)" maxlength="20" autocomplete="off" value="oda1"/>
    <button class="btn-gold" onclick="joinGame()">
      <i class="fas fa-dice"></i> Oyuna Gir
    </button>
  </div>
</div>

<!-- SIDE SELECTION MODAL -->
<div id="sideModal">
  <div class="side-box">
    <h3><i class="fas fa-arrows-left-right"></i> Taşı nereye koy?</h3>
    <div class="side-btns">
      <button class="side-btn left"  onclick="confirmPlace('left')"><i class="fas fa-arrow-left"></i> Sol</button>
      <button class="side-btn auto"  onclick="confirmPlace('auto')"><i class="fas fa-wand-magic-sparkles"></i> Otomatik</button>
      <button class="side-btn right" onclick="confirmPlace('right')"><i class="fas fa-arrow-right"></i> Sağ</button>
    </div>
  </div>
</div>

<!-- WIN OVERLAY -->
<div id="winOverlay">
  <div class="win-box">
    <h2>🏆 Oyun Bitti!</h2>
    <p id="winMsg">Tebrikler!</p>
    <div class="win-scores" id="winScores"></div>
    <button class="btn-gold" onclick="requestNewRound()" style="width:auto;padding:14px 40px;margin-top:10px">
      <i class="fas fa-redo"></i> Yeni Tur
    </button>
  </div>
</div>

<!-- NOTIFICATIONS -->
<div id="notifications"></div>

<!-- APP -->
<div id="app">
  <header>
    <h2><i class="fas fa-dice-d6"></i> 3D Domino 101</h2>
    <div class="header-info">
      <div class="round-badge"><i class="fas fa-layer-group"></i> <span id="roundNum">Tur 1</span></div>
      <div class="turn-badge"><div class="dot"></div><span id="turnName">Bekliyor...</span></div>
      <button id="btnStart" onclick="startGame()">
        <i class="fas fa-play"></i> Oyunu Başlat
      </button>
    </div>
  </header>

  <!-- BOARD -->
  <div id="boardArea">
    <div id="boardInner">
      <div id="emptyBoard" style="color:#2a5a3a;font-size:.9rem;letter-spacing:.1em;text-transform:uppercase;padding:20px;">
        <i class="fas fa-dice" style="margin-right:8px;"></i>Oyun bekleniyor...
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="rightPanel">
    <div id="playersList">
      <h3><i class="fas fa-users"></i> Oyuncular</h3>
      <div id="playersContainer"></div>
    </div>
    <div id="scoreBoard">
      <h3><i class="fas fa-trophy"></i> Skor Tablosu</h3>
      <div id="scoresContainer"></div>
    </div>
    <div id="chatPanel">
      <h3><i class="fas fa-comments"></i> Sohbet</h3>
      <div id="chatMessages"></div>
      <div id="chatInput">
        <input id="chatMsg" type="text" placeholder="Mesaj yaz..." maxlength="200" autocomplete="off"/>
        <button onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>

  <!-- HAND AREA -->
  <div id="handArea">
    <div id="handTiles"></div>
    <button id="boneyardBtn" onclick="drawTile()" disabled>
      <div class="boneyard-icon">
        <span class="mini-tile"></span>
        <span class="mini-tile"></span>
        <span class="mini-tile"></span>
      </div>
      <div>Pazardan Al</div>
      <div id="boneyardCount">0 taş</div>
    </button>
  </div>
</div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
let socket, myId, myName, myColor, myHand = [], roomState = null;
let selectedTileId = null, pendingTileId = null;
const DOT_POSITIONS = {
  0: [],
  1: [[50,50]],
  2: [[25,25],[75,75]],
  3: [[25,25],[50,50],[75,75]],
  4: [[25,25],[75,25],[25,75],[75,75]],
  5: [[25,25],[75,25],[50,50],[25,75],[75,75]],
  6: [[25,25],[75,25],[25,50],[75,50],[25,75],[75,75]]
};

// ─── JOIN ─────────────────────────────────────────────────────────────────────
function joinGame() {
  const name = document.getElementById('nameInput').value.trim();
  const roomId = document.getElementById('roomInput').value.trim();
  if (!name || !roomId) { notify('⚠️ İsim ve oda giriniz!', 'warn'); return; }

  myName = name;
  socket = io();
  bindSocketEvents();
  socket.emit('join', { name, roomId });

  document.getElementById('loginScreen').classList.add('hide');
}

// ─── SOCKET EVENTS ────────────────────────────────────────────────────────────
function bindSocketEvents() {
  socket.on('connect', () => { myId = socket.id; });

  socket.on('room_update', (state) => {
    roomState = state;
    renderPlayers(state);
    renderScores(state);
    renderBoard(state);
    updateHeader(state);
    updateBoneyardBtn(state);
    updateHandPlayable(state);
  });

  socket.on('your_hand', (hand) => {
    myHand = hand;
    renderHand(hand);
    if (roomState) updateHandPlayable(roomState);
  });

  socket.on('game_started', ({ firstPlayer }) => {
    notify(`🎮 Oyun Başladı! ${firstPlayer === myId ? 'SEN' : 'Rakip'} oynuyor`, 'success');
    document.getElementById('btnStart').style.display = 'none';
  });

  socket.on('tile_placed', ({ playerId, playerName, tile, side }) => {
    if (playerId !== myId) {
      notify(`${playerName} taş koydu: [${tile.left}|${tile.right}]`);
    }
    spawnPlaceEffect();
  });

  socket.on('player_drew', ({ playerId, playerName, boneyardLeft }) => {
    if (playerId !== myId) {
      notify(`<i class="fas fa-hand-holding"></i> ${playerName} pazardan taş aldı`);
    }
  });

  socket.on('drew_tile', ({ tile, playable }) => {
    notify(`Taş çekildi: [${tile.left}|${tile.right}] ${playable ? '✅ Oynanabilir' : '❌ Oynanamaz, tekrar çekebilirsin'}`, playable ? 'success' : 'info');
    animateNewTile(tile.id);
  });

  socket.on('game_over', ({ winner, winnerName, scores }) => {
    showWinScreen(winner, winnerName, scores);
    spawnConfetti();
  });

  socket.on('new_round_started', ({ round }) => {
    document.getElementById('winOverlay').classList.remove('show');
    notify(`🔄 Yeni tur (${round}. tur) başladı!`, 'success');
  });

  socket.on('error_msg', (msg) => notify(`❌ ${msg}`, 'error'));

  socket.on('chat', (data) => renderChatMsg(data));
}

// ─── GAME ACTIONS ─────────────────────────────────────────────────────────────
function startGame() { socket.emit('start_game'); }
function drawTile()   { socket.emit('draw_tile'); }
function passTurn()   { socket.emit('pass_turn'); }
function requestNewRound() { socket.emit('new_round'); }

function selectTile(tileId) {
  if (!roomState || roomState.turn !== myId) return;
  const tile = myHand.find(t => t.id === tileId);
  if (!tile) return;

  if (selectedTileId === tileId) {
    selectedTileId = null;
    renderHand(myHand);
    return;
  }
  selectedTileId = tileId;
  renderHand(myHand);

  // If board is empty or only one end → auto place
  if (roomState.board.length === 0) {
    socket.emit('place_tile', { tileId, side: 'auto' });
    selectedTileId = null;
    return;
  }

  // Check which sides are valid
  const { left, right } = roomState.boardEnds;
  const canLeft  = tile.left === left  || tile.right === left;
  const canRight = tile.left === right || tile.right === right;

  if (canLeft && canRight && left !== right) {
    // Both sides valid → ask
    pendingTileId = tileId;
    document.getElementById('sideModal').classList.add('show');
  } else {
    socket.emit('place_tile', { tileId, side: 'auto' });
    selectedTileId = null;
  }
}

function confirmPlace(side) {
  if (!pendingTileId) return;
  socket.emit('place_tile', { tileId: pendingTileId, side });
  pendingTileId = null;
  selectedTileId = null;
  document.getElementById('sideModal').classList.remove('show');
  renderHand(myHand);
}

// ─── RENDER HAND ──────────────────────────────────────────────────────────────
function renderHand(hand) {
  const container = document.getElementById('handTiles');
  container.innerHTML = '';
  const isMyTurn = roomState && roomState.turn === myId;

  document.getElementById('handArea').classList.toggle('my-turn', isMyTurn && !!roomState?.started);

  hand.forEach((tile, i) => {
    const playable = isMyTurn && roomState?.started && canPlayTile(tile);
    const el = createDominoEl(tile, false, playable, selectedTileId === tile.id);
    el.style.animationDelay = `${i * 0.04}s`;
    el.style.animation = 'tileFlyin .35s cubic-bezier(.34,1.56,.64,1) both';
    el.style.animationDelay = `${i * 0.03}s`;
    if (playable) {
      el.addEventListener('click', () => selectTile(tile.id));
    }
    container.appendChild(el);
  });
}

function canPlayTile(tile) {
  if (!roomState) return false;
  if (roomState.board.length === 0) return true;
  const { left, right } = roomState.boardEnds;
  return tile.left === left || tile.right === left || tile.left === right || tile.right === right;
}

function updateHandPlayable(state) {
  if (!myHand.length) return;
  renderHand(myHand);
}

// ─── RENDER BOARD ──────────────────────────────────────────────────────────────
function renderBoard(state) {
  const inner = document.getElementById('boardInner');
  const empty = document.getElementById('emptyBoard');

  if (!state.board || state.board.length === 0) {
    inner.innerHTML = '';
    if (empty) { empty.style.display='block'; inner.appendChild(empty); }
    return;
  }
  if (empty) empty.style.display='none';
  inner.innerHTML = '';

  state.board.forEach((tile, i) => {
    const el = createDominoEl(tile, true, false, false);
    el.classList.add('on-board', 'horizontal');
    el.style.animation = `tileFlyin .4s cubic-bezier(.34,1.56,.64,1) both`;
    el.style.animationDelay = `0s`; // already on board, no delay for re-renders
    inner.appendChild(el);
  });

  // Auto-scroll to end
  const boardArea = document.getElementById('boardArea');
  setTimeout(() => { boardArea.scrollLeft = boardArea.scrollWidth; }, 50);
}

// ─── CREATE DOMINO ELEMENT ────────────────────────────────────────────────────
function createDominoEl(tile, onBoard, playable, selected) {
  const wrap = document.createElement('div');
  wrap.className = 'domino';
  if (!playable && !onBoard) wrap.classList.add('unplayable');
  if (selected) wrap.classList.add('selected');
  wrap.dataset.id = tile.id;

  const body = document.createElement('div');
  body.className = 'tile-body';

  body.appendChild(makeFace(tile.left));
  body.appendChild(makeFace(tile.right));
  wrap.appendChild(body);

  // 3D shadow effect via CSS already handles it; add glow for playable
  if (playable) {
    wrap.style.filter = 'drop-shadow(0 0 8px rgba(201,168,76,.5))';
    wrap.style.cursor = 'pointer';
  }
  return wrap;
}

function makeFace(num) {
  const face = document.createElement('div');
  face.className = 'face';
  const dots = document.createElement('div');
  dots.className = 'dots';
  dots.style.display = 'grid';
  dots.style.gridTemplateColumns = 'repeat(3,1fr)';
  dots.style.gridTemplateRows = 'repeat(3,1fr)';
  dots.style.padding = '4px';
  dots.style.width = '100%';
  dots.style.height = '100%';

  // Use dot positions
  const positions = DOT_POSITIONS[num] || [];
  // We'll use absolute positioned dots
  dots.style.position = 'relative';
  dots.style.display = 'block';

  positions.forEach(([x, y]) => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.style.position = 'absolute';
    dot.style.left = `${x}%`;
    dot.style.top  = `${y}%`;
    dot.style.transform = 'translate(-50%,-50%)';
    dots.appendChild(dot);
  });

  face.appendChild(dots);
  return face;
}

// ─── RENDER PLAYERS ────────────────────────────────────────────────────────────
function renderPlayers(state) {
  const container = document.getElementById('playersContainer');
  container.innerHTML = '';
  Object.entries(state.players).forEach(([pid, p]) => {
    const item = document.createElement('div');
    item.className = 'player-item';
    if (pid === state.turn) item.classList.add('active-turn');
    if (pid === myId) item.classList.add('me');

    const initial = p.name.charAt(0).toUpperCase();
    item.innerHTML = `
      <div class="avatar" style="background:${p.color}">${initial}</div>
      <div class="player-info">
        <div class="player-name">${p.name} ${pid===myId?'<span style="color:#5dade2;font-size:.75rem;">(Sen)</span>':''}</div>
        <div class="player-score">Skor: ${state.scores[pid] || 0}</div>
      </div>
      <div class="hand-count"><i class="fas fa-layer-group"></i>${p.handCount}</div>
    `;
    container.appendChild(item);
  });
}

function renderScores(state) {
  const container = document.getElementById('scoresContainer');
  container.innerHTML = '';
  const sorted = Object.entries(state.scores).sort((a,b)=>b[1]-a[1]);
  sorted.forEach(([pid, score]) => {
    const p = state.players[pid];
    if (!p) return;
    const row = document.createElement('div');
    row.className = 'score-row';
    row.innerHTML = `<span>${p.name}</span><span class="score-val">${score}</span>`;
    container.appendChild(row);
  });
}

function updateHeader(state) {
  const turnPlayer = state.players[state.turn];
  const turnName = turnPlayer ? (state.turn === myId ? '🟢 Senin sıran!' : `⏳ ${turnPlayer.name}`) : 'Bekliyor...';
  document.getElementById('turnName').textContent = turnName;
  document.getElementById('roundNum').textContent = `Tur ${state.round}`;
}

function updateBoneyardBtn(state) {
  const btn = document.getElementById('boneyardBtn');
  const count = state.boneyardCount;
  document.getElementById('boneyardCount').textContent = `${count} taş`;
  btn.disabled = !(state.started && state.turn === myId && count > 0);
}

// ─── CHAT ─────────────────────────────────────────────────────────────────────
function sendChat() {
  const inp = document.getElementById('chatMsg');
  const msg = inp.value.trim();
  if (!msg) return;
  socket.emit('chat', { msg });
  inp.value = '';
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.activeElement.id === 'chatMsg') sendChat();
  if (e.key === 'Enter' && document.activeElement.id === 'nameInput') joinGame();
  if (e.key === 'Enter' && document.activeElement.id === 'roomInput') joinGame();
  if (e.key === 'Escape') {
    document.getElementById('sideModal').classList.remove('show');
    selectedTileId = null;
    pendingTileId = null;
    renderHand(myHand);
  }
});

function renderChatMsg(data) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-msg';

  if (data.system) {
    div.classList.add('system');
    div.innerHTML = `<span class="sys-text"><i class="fas fa-circle-info"></i> ${data.msg}</span>`;
  } else {
    const isMe = data.senderId === myId;
    if (isMe) div.classList.add('mine');
    const initial = data.name.charAt(0).toUpperCase();
    div.innerHTML = `
      <div class="msg-avatar" style="background:${data.color}">${initial}</div>
      <div class="msg-bubble">
        ${!isMe ? `<div class="msg-name" style="color:${data.color}">${data.name}</div>` : ''}
        ${data.msg}
      </div>
    `;
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

// ─── EFFECTS ──────────────────────────────────────────────────────────────────
function notify(msg, type='info') {
  const n = document.getElementById('notifications');
  const el = document.createElement('div');
  el.className = 'notif';
  const colors = { info:'#c9a84c', success:'#2ecc71', warn:'#e67e22', error:'#e74c3c' };
  el.style.borderColor = colors[type] || colors.info;
  el.innerHTML = msg;
  n.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function spawnPlaceEffect() {
  const board = document.getElementById('boardArea');
  const rect = board.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'tile-place-effect';
  el.style.left = (rect.right - 80) + 'px';
  el.style.top  = (rect.top + rect.height/2 - 40) + 'px';
  el.style.position = 'fixed';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 500);
}

function animateNewTile(tileId) {
  setTimeout(() => {
    const el = document.querySelector(`#handTiles .domino[data-id="${tileId}"]`);
    if (el) el.classList.add('draw-effect');
  }, 100);
}

function spawnConfetti() {
  const colors = ['#c9a84c','#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration = (2 + Math.random()*2) + 's';
    el.style.animationDelay = Math.random() * 1 + 's';
    el.style.transform = `rotate(${Math.random()*360}deg)`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4500);
  }
}

function showWinScreen(winner, winnerName, scores) {
  const overlay = document.getElementById('winOverlay');
  overlay.classList.add('show');
  document.getElementById('winMsg').textContent =
    winner === myId ? '🏆 Tebrikler! Kazandınız!' : `😔 ${winnerName} kazandı!`;

  const scoresDiv = document.getElementById('winScores');
  scoresDiv.innerHTML = '';
  if (roomState) {
    Object.entries(scores).forEach(([pid, score]) => {
      const p = roomState.players[pid];
      if (!p) return;
      const row = document.createElement('div');
      row.className = 'win-score-row';
      row.innerHTML = `<span>${p.name}</span><span class="wscore">${score} puan</span>`;
      scoresDiv.appendChild(row);
    });
  }
}

// myColor assignment after join
socket && socket.on && socket.on('room_update', (s) => {
  if (s.players[myId]) myColor = s.players[myId].color;
});
</script>
</body>
</html>
