<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#060e06"/>
<title>🎲 Domino 101</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="/socket.io/socket.io.js"></script>
<style>
:root{
  --bg:#060e06;--gold:#d4a843;--text:#eee8d5;--muted:#5a7a5a;
  --border:rgba(212,168,67,.25);--green:#27ae60;--red:#e74c3c;--blue:#2980b9;
  --safe-b:env(safe-area-inset-bottom,0px);
  --tile-w:42px;--tile-h:42px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;height:100dvh;overflow:hidden;background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);user-select:none;-webkit-user-select:none;}

/* ══ LOGIN ══ */
#loginScreen{
  position:fixed;inset:0;z-index:999;
  background:radial-gradient(ellipse at 50% 30%,#0f3018 0%,#060e06 65%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
  transition:opacity .4s,transform .4s;
}
#loginScreen.hide{opacity:0;pointer-events:none;transform:scale(1.04);}
.login-logo{font-size:4.5rem;margin-bottom:8px;animation:logoBounce 2s ease infinite;filter:drop-shadow(0 0 20px rgba(212,168,67,.5));}
@keyframes logoBounce{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-10px) rotate(5deg)}}
.login-title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.7rem,7vw,2.6rem);color:var(--gold);text-shadow:0 0 30px rgba(212,168,67,.5);margin-bottom:4px;text-align:center;}
.login-sub{color:var(--muted);font-size:.9rem;margin-bottom:32px;text-align:center;}
.login-form{background:linear-gradient(160deg,#0d2010,#08140a);border:1px solid var(--border);border-radius:18px;padding:28px 24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.inp-g{position:relative;margin-bottom:13px;}
.inp-g i{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem;pointer-events:none;}
.inp-g input{width:100%;padding:14px 14px 14px 42px;background:rgba(255,255,255,.05);border:1.5px solid rgba(212,168,67,.2);border-radius:12px;color:var(--text);font-family:'Nunito';font-size:1rem;font-weight:600;outline:none;transition:border-color .2s,box-shadow .2s;}
.inp-g input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,67,.12);}
.inp-g input::placeholder{color:rgba(255,255,255,.2);font-weight:400;}
.btn-join{width:100%;padding:15px;background:linear-gradient(135deg,#d4a843,#a07828);border:none;border-radius:13px;color:#06100a;font-family:'Cinzel Decorative',serif;font-size:1rem;font-weight:900;letter-spacing:.04em;cursor:pointer;transition:all .2s;box-shadow:0 6px 24px rgba(212,168,67,.35);margin-top:4px;}
.btn-join:active{transform:scale(.97);}

/* ══ APP SHELL ══ */
#app{display:flex;flex-direction:column;height:100dvh;position:relative;}

/* ── TOPBAR ── */
#topbar{
  flex-shrink:0;height:52px;
  background:linear-gradient(90deg,#060e06,#0a1a0a,#060e06);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:7px;
  box-shadow:0 2px 16px rgba(0,0,0,.5);z-index:10;
}
.topbar-logo{font-family:'Cinzel Decorative',serif;color:var(--gold);font-size:.9rem;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badge{padding:3px 8px;border-radius:7px;font-size:.7rem;font-weight:700;display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0;}
.badge-turn{background:rgba(212,168,67,.12);border:1px solid rgba(212,168,67,.3);color:var(--gold);}
.badge-round{background:rgba(41,128,185,.12);border:1px solid rgba(41,128,185,.3);color:#5dade2;}
.bdot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.5)}}
.topbar-actions{display:flex;gap:6px;flex-shrink:0;}
.icon-btn{width:34px;height:34px;border-radius:9px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .18s;position:relative;}
.icon-btn:active{transform:scale(.86);}
.icon-btn.green{background:rgba(39,174,96,.2);border:1px solid rgba(39,174,96,.4);color:#2ecc71;}
.icon-btn.blue{background:rgba(41,128,185,.2);border:1px solid rgba(41,128,185,.4);color:#5dade2;}
.icon-btn.gold{background:rgba(212,168,67,.15);border:1px solid rgba(212,168,67,.4);color:var(--gold);}
.chat-badge{position:absolute;top:-3px;right:-3px;width:14px;height:14px;border-radius:50%;background:var(--red);font-size:.58rem;font-weight:900;display:flex;align-items:center;justify-content:center;}

/* ══ TABLE — 4-PLAYER LAYOUT ══
   Top opponent | Left & Right opponents | My hand bottom
*/
#table{
  flex:1;position:relative;overflow:hidden;
  background:radial-gradient(ellipse at 50% 50%,#0d3018 0%,#071510 55%,#040c08 100%);
}
#table::before{content:'';position:absolute;inset:0;pointer-events:none;
  background-image:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(0,0,0,.03) 4px,rgba(0,0,0,.03) 8px);}

/* Opponent hand zones */
.opp-zone{
  position:absolute;display:flex;align-items:center;
  gap:2px;z-index:3;pointer-events:none;
}
/* TOP opponent — horizontal row, centered at top */
#opp-top{
  top:8px;left:50%;transform:translateX(-50%);
  flex-direction:row;
}
/* LEFT opponent — vertical column on left */
#opp-left{
  left:6px;top:50%;transform:translateY(-50%);
  flex-direction:column;
}
/* RIGHT opponent — vertical column on right */
#opp-right{
  right:6px;top:50%;transform:translateY(-50%);
  flex-direction:column;
}

/* Opponent info badge */
.opp-info{
  position:absolute;
  display:flex;align-items:center;gap:5px;
  background:rgba(6,14,6,.85);border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:4px 10px 4px 5px;
  backdrop-filter:blur(4px);
  z-index:5;pointer-events:none;
}
#opp-top    .opp-info{top:calc(100% + 4px);left:50%;transform:translateX(-50%);}
#opp-left   .opp-info{left:calc(100% + 4px);top:50%;transform:translateY(-50%);}
#opp-right  .opp-info{right:calc(100% + 4px);top:50%;transform:translateY(-50%);}
.opp-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:900;color:#fff;flex-shrink:0;border:1.5px solid rgba(255,255,255,.2);}
.opp-av.active-turn{border-color:#ffd600;box-shadow:0 0 0 2px rgba(255,214,0,.4);}
.opp-label{font-size:.68rem;font-weight:800;color:var(--text);white-space:nowrap;max-width:60px;overflow:hidden;text-overflow:ellipsis;}
.opp-cnt{font-size:.62rem;color:var(--gold);font-weight:900;}

/* Opponent card back */
.opp-card{
  width:26px;height:40px;border-radius:5px;
  background:linear-gradient(135deg,#1a3a20,#0a1e10);
  border:1.5px solid rgba(212,168,67,.3);
  box-shadow:1px 2px 4px rgba(0,0,0,.6);
  position:relative;overflow:hidden;flex-shrink:0;
}
.opp-card::before{
  content:'';position:absolute;inset:2px;border-radius:3px;
  border:1px solid rgba(212,168,67,.15);
  background:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(212,168,67,.05) 3px,rgba(212,168,67,.05) 6px);
}
/* left/right opp cards are rotated 90deg */
#opp-left  .opp-card,#opp-right .opp-card{
  width:40px;height:26px;
}
/* empty slot when player not present */
.opp-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:.25;gap:4px;
}
.opp-empty i{font-size:1.2rem;color:var(--muted);}
.opp-empty span{font-size:.6rem;color:var(--muted);}

/* ── BOARD (center scrollable) ── */
#boardWrap{
  position:absolute;
  /* leave room for top opp (68px), left/right opps (56px), bottom hand (130px) */
  top:68px;left:60px;right:60px;bottom:0;
  overflow:auto;-webkit-overflow-scrolling:touch;
}
#boardInner{
  min-width:100%;min-height:100%;
  display:flex;align-items:center;padding:20px 12px;
  gap:2px;flex-wrap:nowrap;
}
#emptyBoard{
  color:#2a5a3a;font-size:.8rem;letter-spacing:.08em;
  text-transform:uppercase;text-align:center;width:100%;
  display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;
}
#emptyBoard i{font-size:1.8rem;color:#1a4a2a;}

/* ── MY HAND ── */
#handStrip{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,#040c06,#081408);
  border-top:1px solid var(--border);
  padding:8px 10px calc(10px + var(--safe-b));
  display:flex;align-items:center;gap:8px;
  overflow-x:auto;overflow-y:visible;
  -webkit-overflow-scrolling:touch;
  height:130px;scrollbar-width:none;z-index:4;
}
#handStrip::-webkit-scrollbar{display:none;}
#handStrip.my-turn{box-shadow:0 -4px 28px rgba(212,168,67,.3),inset 0 0 40px rgba(212,168,67,.06);}
#handTiles{display:flex;gap:5px;align-items:center;flex-shrink:0;}

.action-btns{display:flex;flex-direction:column;gap:5px;flex-shrink:0;margin-left:auto;}
#boneyardBtn{
  background:linear-gradient(145deg,#0e2818,#071510);
  border:1.5px solid rgba(212,168,67,.4);border-radius:13px;
  padding:7px 11px;cursor:pointer;transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:3px;min-width:64px;
}
#boneyardBtn:active{transform:scale(.92);}
#boneyardBtn:disabled{opacity:.3;pointer-events:none;}
.boneyard-stack{display:flex;gap:2px;}
.mini-tile{width:9px;height:15px;background:linear-gradient(145deg,#f5f0e0,#ddd5c0);border-radius:2px;border:1px solid #3a2010;box-shadow:1px 1px 0 #2a1408;}
#boneyardLabel{font-size:.6rem;color:var(--muted);font-weight:700;}
#boneyardCount{font-size:.75rem;color:var(--gold);font-weight:900;}
#passBtn{
  background:rgba(231,76,60,.1);border:1.5px solid rgba(231,76,60,.35);border-radius:9px;
  padding:6px 9px;cursor:pointer;transition:all .2s;
  font-family:'Nunito';font-size:.68rem;font-weight:800;color:#e74c3c;
  display:none;
}
#passBtn.show{display:flex;align-items:center;gap:4px;}
#passBtn:active{transform:scale(.92);}

/* ══ 3D DOMINO ══ */
.domino{
  position:relative;display:inline-flex;flex-direction:column;
  cursor:pointer;flex-shrink:0;margin:1px;
  transition:transform .12s ease,filter .12s;
}
.domino.playable:not(.selected){animation:tileGlow 1.8s ease infinite;cursor:pointer;}
@keyframes tileGlow{0%,100%{filter:drop-shadow(0 0 4px rgba(212,168,67,.5))}50%{filter:drop-shadow(0 0 11px rgba(212,168,67,.95))}}
.domino.selected{transform:translateY(-20px) rotateX(14deg) scale(1.18)!important;filter:brightness(1.35) drop-shadow(0 0 16px rgba(212,168,67,1));z-index:30;}
.domino.unplayable{opacity:.35;cursor:not-allowed;}
.domino.unplayable:active{transform:none!important;}

.tile-body{
  display:flex;flex-direction:column;
  background:linear-gradient(150deg,#f8f3e3,#e3d9c1);
  border:2.5px solid #3a2010;border-radius:8px;
  box-shadow:3px 5px 0 #2c1a08,3px 5px 14px rgba(0,0,0,.75),inset 0 1px 0 rgba(255,255,255,.65);
  overflow:hidden;transform:perspective(160px) rotateX(4deg);position:relative;
}
.tile-body::after{content:'';position:absolute;left:4px;right:4px;top:50%;height:1.5px;background:rgba(50,25,8,.3);transform:translateY(-50%);pointer-events:none;}
.face{width:var(--tile-w);height:var(--tile-h);position:relative;background:linear-gradient(145deg,#f9f4e4,#e9e0ca);}
.face:last-child{border-top:1.5px solid rgba(0,0,0,.15);}
.dot{position:absolute;width:6px;height:6px;background:radial-gradient(circle at 35% 30%,#5a2a10,#1a0800);border-radius:50%;box-shadow:inset 0 1px 1px rgba(0,0,0,.4);transform:translate(-50%,-50%);}

/* Board tiles — horizontal, slightly bigger */
.domino.on-board{cursor:default;animation:none;}
.domino.on-board:active{transform:none!important;}
.domino.on-board .face{width:46px;height:46px;}
.domino.horizontal .tile-body{flex-direction:row;}
.domino.horizontal .face:last-child{border-top:none;border-left:1.5px solid rgba(0,0,0,.15);}
.domino.horizontal .face{width:46px;height:46px;}

/* ══ TILE SMASH ANIMATION ══ */
/* Flying ghost tile (for my plays) */
.ghost-tile{
  position:fixed;pointer-events:none;z-index:200;
  transform-origin:center bottom;
  will-change:transform,opacity;
}
/* Board "newly landed" tile smash */
@keyframes smashLand{
  0%  {transform:perspective(300px) rotateX(-60deg) translateY(-20px) scale(1.3);opacity:.9;filter:brightness(1.8);}
  55% {transform:perspective(300px) rotateX(6deg) translateY(3px) scale(1.05);opacity:1;filter:brightness(1.2);}
  75% {transform:perspective(300px) rotateX(-3deg) translateY(-1px) scale(1.01);filter:brightness(1.05);}
  100%{transform:perspective(300px) rotateX(0deg) translateY(0) scale(1);filter:brightness(1);}
}
.domino.smash{animation:smashLand .32s cubic-bezier(.22,1,.36,1) both;}

/* Opponent tile flying in from their zone */
@keyframes flyFromTop{
  0%  {transform:translateY(-120px) scale(.6) rotate(-8deg);opacity:0;}
  60% {transform:translateY(8px) scale(1.06) rotate(1deg);opacity:1;}
  80% {transform:translateY(-3px) scale(.99);opacity:1;}
  100%{transform:translateY(0) scale(1) rotate(0);opacity:1;}
}
@keyframes flyFromLeft{
  0%  {transform:translateX(-120px) scale(.6) rotate(8deg);opacity:0;}
  60% {transform:translateX(8px) scale(1.06);opacity:1;}
  100%{transform:translateX(0) scale(1);opacity:1;}
}
@keyframes flyFromRight{
  0%  {transform:translateX(120px) scale(.6) rotate(-8deg);opacity:0;}
  60% {transform:translateX(-8px) scale(1.06);opacity:1;}
  100%{transform:translateX(0) scale(1);opacity:1;}
}
@keyframes flyFromBottom{
  0%  {transform:translateY(100px) scale(.6);opacity:0;}
  60% {transform:translateY(-8px) scale(1.1);opacity:1;}
  100%{transform:translateY(0) scale(1);opacity:1;}
}
.fly-top   .domino.smash{animation:flyFromTop   .38s cubic-bezier(.22,1,.36,1) both!important;}
.fly-left  .domino.smash{animation:flyFromLeft  .38s cubic-bezier(.22,1,.36,1) both!important;}
.fly-right .domino.smash{animation:flyFromRight .38s cubic-bezier(.22,1,.36,1) both!important;}
.fly-bottom .domino.smash{animation:flyFromBottom .38s cubic-bezier(.22,1,.36,1) both!important;}

/* Impact shake on board */
@keyframes boardShake{0%,100%{transform:none}20%{transform:translateX(-3px)}40%{transform:translateX(3px)}60%{transform:translateX(-2px)}80%{transform:translateX(1px)}}
.shake{animation:boardShake .22s ease;}

/* Draw bounce for new tile in hand */
@keyframes drawBounce{
  from{transform:scale(0) translateY(-30px) rotate(-15deg);opacity:0;filter:brightness(2);}
  65%{transform:scale(1.2) translateY(4px) rotate(2deg);opacity:1;}
  85%{transform:scale(.95) translateY(-2px);}
  100%{transform:scale(1) translateY(0) rotate(0);opacity:1;filter:brightness(1);}
}
.draw-bounce{animation:drawBounce .4s cubic-bezier(.34,1.56,.64,1) both;}

@keyframes tileFlyin{
  from{transform:scale(0) rotate(-15deg);opacity:0}
  65%{transform:scale(1.12) rotate(2deg);opacity:1}
  to{transform:scale(1) rotate(0);opacity:1}
}

/* Impact ripple on board */
.impact-ring{
  position:fixed;pointer-events:none;z-index:100;
  width:60px;height:60px;border-radius:50%;
  border:3px solid rgba(212,168,67,.8);
  transform:translate(-50%,-50%);
  animation:impactRing .5s ease forwards;
}
@keyframes impactRing{
  0%{transform:translate(-50%,-50%) scale(.3);opacity:1;border-width:3px;}
  100%{transform:translate(-50%,-50%) scale(3.5);opacity:0;border-width:0;}
}

/* Dust puff */
.dust{
  position:fixed;pointer-events:none;z-index:99;
  width:50px;height:30px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(212,168,67,.3),transparent 70%);
  transform:translate(-50%,-50%);
  animation:dustPuff .5s ease forwards;
}
@keyframes dustPuff{0%{transform:translate(-50%,-50%) scale(.2);opacity:.9}100%{transform:translate(-50%,-50%) scale(2.5);opacity:0}}

/* ══ OVERLAYS / SHEETS ══ */
.overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.show{opacity:1;pointer-events:all;}
.sheet{width:100%;max-width:480px;background:linear-gradient(160deg,#0d2010,#070f07);border-radius:22px 22px 0 0;border:1px solid rgba(255,255,255,.08);border-bottom:none;padding:0 0 calc(20px + var(--safe-b));transform:translateY(100%);transition:transform .3s cubic-bezier(.34,.7,.46,1);max-height:85dvh;overflow-y:auto;}
.overlay.show .sheet{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.12);margin:11px auto 0;}
.sheet-header{display:flex;align-items:center;gap:10px;padding:13px 17px 11px;border-bottom:1px solid rgba(255,255,255,.06);}
.sheet-header h3{font-size:.98rem;font-weight:800;flex:1;}
.sheet-close{width:27px;height:27px;border-radius:8px;border:none;cursor:pointer;background:rgba(255,255,255,.06);color:var(--muted);font-size:.82rem;display:flex;align-items:center;justify-content:center;}

/* Side select */
.side-options{display:flex;flex-direction:column;gap:9px;padding:14px 16px;}
.side-opt{padding:15px;border-radius:13px;cursor:pointer;border:none;font-family:'Nunito';font-weight:800;font-size:.98rem;display:flex;align-items:center;gap:11px;transition:all .15s;}
.side-opt:active{transform:scale(.97);}
.side-opt.left{background:rgba(41,128,185,.15);border:1.5px solid rgba(41,128,185,.4);color:#5dade2;}
.side-opt.right{background:rgba(39,174,96,.15);border:1.5px solid rgba(39,174,96,.4);color:#2ecc71;}
.side-opt.auto{background:rgba(212,168,67,.12);border:1.5px solid rgba(212,168,67,.4);color:var(--gold);}
.side-opt i{font-size:1.1rem;width:20px;text-align:center;}
.side-opt-lbl{flex:1;text-align:left;}
.side-opt-sub{font-size:.72rem;opacity:.55;font-weight:600;}

/* Players */
.p-item{display:flex;align-items:center;gap:11px;padding:11px 17px;border-bottom:1px solid rgba(255,255,255,.04);}
.p-item.active-p{background:rgba(212,168,67,.07);}
.p-item.me-p{background:rgba(41,128,185,.05);}
.p-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.95rem;color:#fff;flex-shrink:0;box-shadow:0 2px 10px rgba(0,0,0,.4);border:2px solid rgba(255,255,255,.12);}
.p-info{flex:1;min-width:0;}
.p-name{font-weight:800;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-sub{font-size:.72rem;color:var(--muted);}
.p-pill{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:7px;padding:3px 9px;font-size:.76rem;font-weight:800;display:flex;align-items:center;gap:4px;flex-shrink:0;}

/* Scores */
.score-row{display:flex;align-items:center;gap:11px;padding:9px 17px;border-bottom:1px solid rgba(255,255,255,.04);}
.score-rank{width:20px;height:20px;border-radius:6px;background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.2);display:flex;align-items:center;justify-content:center;font-size:.72rem;color:var(--gold);font-weight:900;}
.score-name{flex:1;font-weight:700;font-size:.88rem;}
.score-val{font-weight:900;font-size:1rem;color:var(--gold);}

/* Chat */
#chatMessages{max-height:44vh;overflow-y:auto;padding:9px 15px;display:flex;flex-direction:column;gap:5px;scrollbar-width:thin;scrollbar-color:#1a3a1a transparent;}
#chatMessages::-webkit-scrollbar{width:3px;}
#chatMessages::-webkit-scrollbar-thumb{background:#1a3a1a;border-radius:2px;}
.chat-msg{display:flex;gap:7px;animation:msgIn .2s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.chat-msg.system{justify-content:center;}
.sys-text{font-size:.72rem;color:#3a6a3a;padding:3px 10px;background:rgba(255,255,255,.02);border-radius:9px;}
.chat-msg.mine{flex-direction:row-reverse;}
.msg-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:900;flex-shrink:0;margin-top:2px;}
.msg-bubble{max-width:80%;padding:7px 11px;border-radius:13px 13px 13px 4px;font-size:.84rem;line-height:1.4;background:rgba(255,255,255,.07);}
.chat-msg.mine .msg-bubble{border-radius:13px 13px 4px 13px;background:rgba(212,168,67,.1);}

.chat-input-row{display:flex;gap:7px;padding:9px 15px 0;}

.chat-send:active{transform:scale(.9);}

/* Win overlay */
#winOverlay{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:24px;}
#winOverlay.show{display:flex;}
.win-box{background:linear-gradient(145deg,#0d2010,#06100a);border:1.5px solid var(--gold);border-radius:22px;padding:34px 26px;text-align:center;width:100%;max-width:340px;box-shadow:0 0 80px rgba(212,168,67,.3);animation:winPop .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes winPop{from{transform:scale(.45);opacity:0}to{transform:none;opacity:1}}
.win-trophy{font-size:3.2rem;animation:trophySpin 3s ease infinite;display:block;margin-bottom:8px;}
@keyframes trophySpin{0%,100%{transform:rotate(-5deg) scale(1)}50%{transform:rotate(5deg) scale(1.1)}}
.win-box h2{font-family:'Cinzel Decorative',serif;font-size:1.4rem;color:var(--gold);margin-bottom:5px;}
.win-box p{color:var(--muted);font-size:.88rem;margin-bottom:16px;}
.win-scores{margin:0 0 16px;}
.wrow{display:flex;justify-content:space-between;padding:6px 10px;border-radius:9px;margin-bottom:3px;background:rgba(255,255,255,.04);}
.wrow .wval{color:var(--gold);font-weight:900;}
.win-acts{display:flex;gap:9px;}
.btn-win{flex:1;padding:13px;border:none;border-radius:13px;font-family:'Nunito';font-weight:800;font-size:.92rem;cursor:pointer;transition:all .15s;}
.btn-win:active{transform:scale(.96);}
.btn-win.primary{background:linear-gradient(135deg,#d4a843,#a07828);color:#06100a;box-shadow:0 4px 16px rgba(212,168,67,.3);}
.btn-win.secondary{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:var(--text);}

/* Notifications */
#notifStack{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:700;width:calc(100% - 24px);max-width:340px;display:flex;flex-direction:column;gap:4px;pointer-events:none;align-items:center;}
.notif{background:rgba(6,14,6,.97);border:1px solid rgba(212,168,67,.35);border-radius:11px;padding:8px 14px;font-size:.8rem;font-weight:700;box-shadow:0 4px 20px rgba(0,0,0,.7);text-align:center;width:100%;animation:nIn .22s ease,nOut .22s ease 2.5s forwards;}
@keyframes nIn{from{opacity:0;transform:translateY(-7px)}to{opacity:1;transform:none}}
@keyframes nOut{to{opacity:0;transform:translateY(-7px)}}
.notif.success{border-color:rgba(39,174,96,.5);}
.notif.error{border-color:rgba(231,76,60,.5);}
.notif.warn{border-color:rgba(230,126,34,.5);}

/* Confetti */
.confetti-piece{position:fixed;width:8px;height:12px;top:-20px;border-radius:2px;pointer-events:none;z-index:900;animation:cfFall linear forwards;}
@keyframes cfFall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

  </div>
</div>

<!-- PLAYERS -->
<div class="overlay" id="playersOverlay" onclick="closeOverlay('playersOverlay')">

    <div class="sheet-header"><i class="fas fa-users" style="color:var(--gold)"></i><h3>Oyuncular & Skorlar</h3><button class="sheet-close" onclick="closeOverlay('playersOverlay')"><i class="fas fa-xmark"></i></button></div>

  </div>
</div>

<!-- CHAT -->

    <div class="sheet-header"><i class="fas fa-comments" style="color:var(--gold)"></i><h3>Sohbet</h3><button class="sheet-close" onclick="closeOverlay('chatOverlay')"><i class="fas fa-xmark"></i></button></div>
    <div id="chatMessages"></div>
    <div class="chat-input-row"><input id="chatMsg" type="text" placeholder="Mesaj yaz..." maxlength="200" autocomplete="off"/><button class="chat-send" onclick="sendChat()"><i class="fas fa-paper-plane"></i></button></div>

<!-- APP -->
<div id="app">
  <div id="topbar">
    <div class="topbar-logo"><i class="fas fa-dice-d6"></i> Domino 101</div>

<script>
// ══════════════════════════════════════════════════════════
// AUDIO ENGINE — Web Audio API procedural sounds
// ══════════════════════════════════════════════════════════
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTileDrop(hard = true) {
  try {
    const ctx = getAudio();
    if (ctx.state === 'suspended') ctx.resume();
    const t = ctx.currentTime;

    // Low thud
    const osc1 = ctx.createOscillator();
    const gain1 = ctx.createGain();
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(hard ? 180 : 120, t);
    osc1.frequency.exponentialRampToValueAtTime(40, t + 0.18);
    gain1.gain.setValueAtTime(hard ? 1.2 : 0.7, t);
    gain1.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    osc1.connect(gain1); gain1.connect(ctx.destination);
    osc1.start(t); osc1.stop(t + 0.26);

    // Click transient
    const bufSize = ctx.sampleRate * 0.04;
    const buffer = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.15));
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    const g2 = ctx.createGain();
    g2.gain.setValueAtTime(hard ? 0.9 : 0.5, t);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    src.connect(g2); g2.connect(ctx.destination);
    src.start(t);

    // Rattling clack
    if (hard) {
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.type = 'square';
      osc2.frequency.setValueAtTime(800, t + 0.01);
      osc2.frequency.exponentialRampToValueAtTime(200, t + 0.06);
      gain2.gain.setValueAtTime(0.3, t + 0.01);
      gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      osc2.connect(gain2); gain2.connect(ctx.destination);
      osc2.start(t + 0.01); osc2.stop(t + 0.09);
    }
  } catch(e) {}
}

function playDrawTile() {
  try {
    const ctx = getAudio();
    if (ctx.state === 'suspended') ctx.resume();
    const t = ctx.currentTime;
    // Slide/scrape sound
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(300, t);
    osc.frequency.linearRampToValueAtTime(180, t + 0.12);
    gain.gain.setValueAtTime(0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.15);
    // Small soft thud
    const o2 = ctx.createOscillator();
    const g2 = ctx.createGain();
    o2.type = 'sine';
    o2.frequency.setValueAtTime(90, t + 0.1);
    o2.frequency.exponentialRampToValueAtTime(40, t + 0.22);
    g2.gain.setValueAtTime(0.5, t + 0.1);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.24);
    o2.connect(g2); g2.connect(ctx.destination);
    o2.start(t + 0.1); o2.stop(t + 0.25);
  } catch(e) {}
}

function playWin() {
  try {
    const ctx = getAudio();
    if (ctx.state === 'suspended') ctx.resume();
    [0, 0.15, 0.3, 0.5, 0.7].forEach((delay, i) => {
      const notes = [523, 659, 784, 1047, 1319];
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const t = ctx.currentTime + delay;
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(notes[i], t);
      gain.gain.setValueAtTime(0.4, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.36);
    });
  } catch(e) {}
}

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let socket, myId, myName;
let myHand = [], roomState = null;
let selectedTileId = null, pendingTileId = null;
let unreadChat = 0, chatOpen = false;
let lastBoardLen = 0; // track new tiles added

const DOT_POS = {
  0:[],
  1:[[50,50]],
  2:[[28,28],[72,72]],
  3:[[28,28],[50,50],[72,72]],
  4:[[28,28],[72,28],[28,72],[72,72]],
  5:[[28,28],[72,28],[50,50],[28,72],[72,72]],
  6:[[28,25],[72,25],[28,50],[72,50],[28,75],[72,75]]
};

// Position mapping: given 4 players, who is top/left/right vs me
// order[0]=me, [1]=left, [2]=top, [3]=right (or wrap)
function getOppSlot(idx) {
  // idx = position in order[] relative to me (1,2,3)
  if (idx === 1) return 'left';
  if (idx === 2) return 'top';
  if (idx === 3) return 'right';
  return null;
}

// ══════════════════════════════════════════════════════════
// JOIN
// ══════════════════════════════════════════════════════════
function joinGame() {
  const name = document.getElementById('nameInput').value.trim();
  const room = document.getElementById('roomInput').value.trim();
  if (!name || !room) { notify('⚠️ İsim ve oda giriniz!','warn'); return; }
  myName = name;
  socket = io();
  bindSocket();
  socket.on('connect', () => {
    myId = socket.id;
    socket.emit('join', { name, roomId: room });
  });
  document.getElementById('loginScreen').classList.add('hide');
  // Unlock audio on first interaction
  document.body.addEventListener('touchstart', () => {
    try { getAudio().resume(); } catch(e){}
  }, { once: true });
}

// ══════════════════════════════════════════════════════════
// SOCKET
// ══════════════════════════════════════════════════════════
let lastPlacedBy = null;

function bindSocket() {
  socket.on('room_update', s => {
    roomState = s;
    renderOpponents(s);
    renderBoard(s);
    renderTopbar(s);
    renderBoneyard(s);
    renderPlayers(s);
    renderScores(s);
    renderHand();
  });

  socket.on('your_hand', hand => {
    myHand = hand;
    renderHand();
  });

  socket.on('game_started', ({ firstPlayer }) => {
    document.getElementById('btnStart').style.display = 'none';
    notify(firstPlayer === myId ? '🟢 İlk sen oynuyorsun!' : '🎲 Oyun başladı!', 'success');
  });

  socket.on('tile_placed', ({ playerId, playerName, tile, side }) => {
    lastPlacedBy = playerId;
    if (playerId !== myId) notify(`${playerName}: [${tile.left}|${tile.right}]`);
  });

  socket.on('player_drew', ({ playerId, playerName }) => {
    if (playerId !== myId) notify(`${playerName} pazardan taş aldı`);
  });

  socket.on('drew_tile', ({ tile, playable }) => {
    playDrawTile();
    notify(playable ? `✅ [${tile.left}|${tile.right}] — Oynanabilir!` : `❌ [${tile.left}|${tile.right}] — Oynanamaz`, playable ? 'success' : 'warn');
    setTimeout(() => {
      const el = document.querySelector(`#handTiles [data-id="${tile.id}"]`);
      if (el) el.classList.add('draw-bounce');
    }, 60);
  });

  socket.on('game_over', ({ winner, winnerName, scores }) => {
    showWin(winner, winnerName, scores);
    playWin();
    spawnConfetti();
  });

  socket.on('new_round_started', ({ round }) => {
    document.getElementById('winOverlay').classList.remove('show');
    lastBoardLen = 0;
    notify(`🔄 ${round}. tur başladı!`, 'success');
  });

  socket.on('error_msg', msg => notify('❌ ' + msg, 'error'));
  socket.on('chat', data => {
    appendChat(data);
    if (!chatOpen && !data.system) { unreadChat++; updateChatBadge(); }
  });
}

// ══════════════════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════════════════
function startGame()       { socket.emit('start_game'); }
function drawTile()        { socket.emit('draw_tile'); }
function passTurn()        { socket.emit('pass_turn'); }
function requestNewRound() { socket.emit('new_round'); }

function selectTile(tileId, tileEl) {
  if (!roomState?.started || roomState.turn !== myId) return;
  const tile = myHand.find(t => t.id === tileId);
  if (!tile) return;
  if (selectedTileId === tileId) { selectedTileId = null; renderHand(); return; }
  selectedTileId = tileId;
  renderHand();
  if (!roomState.board || roomState.board.length === 0) { doPlace(tileId, 'auto', tileEl); return; }
  const { left, right } = roomState.boardEnds;
  const canL = tile.left === left || tile.right === left;
  const canR = tile.left === right || tile.right === right;
  if (canL && canR && left !== right) {
    pendingTileId = tileId;
    document.getElementById('sideLeftInfo').textContent = `Sol uç: ${left}`;
    document.getElementById('sideRightInfo').textContent = `Sağ uç: ${right}`;
    openOverlay('sideOverlay');
  } else {
    doPlace(tileId, 'auto', tileEl);
  }
}

function doPlace(tileId, side, srcEl) {
  socket.emit('place_tile', { tileId, side });
  selectedTileId = null; pendingTileId = null;
  renderHand();
}

function confirmPlace(side) {
  const tid = pendingTileId;
  closeOverlay('sideOverlay');
  if (!tid) return;
  doPlace(tid, side, null);
}

// ══════════════════════════════════════════════════════════
// RENDER HAND
// ══════════════════════════════════════════════════════════
function canPlayTile(tile) {
  if (!roomState?.started) return false;
  if (!roomState.board || roomState.board.length === 0) return true;
  const { left, right } = roomState.boardEnds;
  return tile.left === left || tile.right === left || tile.left === right || tile.right === right;
}

function renderHand() {
  const c = document.getElementById('handTiles');
  c.innerHTML = '';
  const myTurn = roomState?.started && roomState?.turn === myId;
  document.getElementById('handStrip').classList.toggle('my-turn', !!myTurn);

  const hasPlayable = myTurn && myHand.some(t => canPlayTile(t));
  const passBtn = document.getElementById('passBtn');
  passBtn.classList.toggle('show', !!myTurn && !hasPlayable && roomState?.boneyardCount === 0);

  myHand.forEach((tile, i) => {
    const playable = myTurn && canPlayTile(tile);
    const el = makeDomino(tile, false, playable, selectedTileId === tile.id);
    el.style.animation = `tileFlyin .28s cubic-bezier(.34,1.56,.64,1) both`;
    el.style.animationDelay = `${i * 0.018}s`;
    if (playable) {
      el.addEventListener('click', () => selectTile(tile.id, el));
    }
    c.appendChild(el);
  });
}

// ══════════════════════════════════════════════════════════
// RENDER BOARD — with smash animation for new tiles
// ══════════════════════════════════════════════════════════
function renderBoard(s) {
  const inner = document.getElementById('boardInner');
  const emptyEl = document.getElementById('emptyBoard');

  if (!s.board || s.board.length === 0) {
    emptyEl.style.display = 'flex';
    Array.from(inner.children).forEach(ch => { if (ch.id !== 'emptyBoard') ch.remove(); });
    lastBoardLen = 0;
    return;
  }
  emptyEl.style.display = 'none';

  const newCount = s.board.length - lastBoardLen;
  const isNewTile = newCount > 0;

  // Rebuild all tiles
  Array.from(inner.children).forEach(ch => { if (ch.id !== 'emptyBoard') ch.remove(); });

  // Determine direction for fly animation
  let flyClass = 'fly-bottom'; // default: from my area
  if (isNewTile && lastPlacedBy && lastPlacedBy !== myId && roomState) {
    const myIdx = roomState.order.indexOf(myId);
    const theirIdx = roomState.order.indexOf(lastPlacedBy);
    const rel = theirIdx === -1 ? -1 : ((theirIdx - myIdx + roomState.order.length) % roomState.order.length);
    if (rel === 1) flyClass = 'fly-left';
    else if (rel === 2) flyClass = 'fly-top';
    else if (rel === 3) flyClass = 'fly-right';
    else flyClass = 'fly-bottom';
  } else {
    flyClass = 'fly-bottom'; // my tile
  }

  s.board.forEach((tile, i) => {
    const el = makeDomino(tile, true, false, false);
    el.classList.add('on-board', 'horizontal');

    const isThisNewRight = isNewTile && i === s.board.length - 1;
    const isThisNewLeft  = isNewTile && i === 0 && s.board.length > 1 && newCount > 0;

    if (isThisNewRight || isThisNewLeft) {
      inner.classList.add(flyClass);
      el.classList.add('smash');
      el.addEventListener('animationend', () => {
        inner.classList.remove(flyClass);
        // smash impact effect
        const rect = el.getBoundingClientRect();
        spawnImpact(rect.left + rect.width/2, rect.top + rect.height/2);
        playTileDrop(true);
        // Board shake
        inner.classList.add('shake');
        setTimeout(() => inner.classList.remove('shake'), 230);
      }, { once: true });
    }
    inner.appendChild(el);
  });

  lastBoardLen = s.board.length;

  const bw = document.getElementById('boardWrap');
  setTimeout(() => { bw.scrollLeft = bw.scrollWidth; }, 60);
}

// ══════════════════════════════════════════════════════════
// RENDER OPPONENTS — 4-player zones with actual card backs
// ══════════════════════════════════════════════════════════
function renderOpponents(s) {
  if (!s.order || !myId) return;
  const myIdx = s.order.indexOf(myId);
  if (myIdx === -1) return;

  const slots = ['left','top','right'];
  const oppIds = [];
  for (let i = 1; i <= 3; i++) {
    const idx = (myIdx + i) % s.order.length;
    oppIds.push(s.order[idx] !== myId ? s.order[idx] : null);
  }

  slots.forEach((slot, si) => {
    const pid = oppIds[si];
    const zone = document.getElementById(`opp-${slot}`);
    const emptyEl = document.getElementById(`opp-${slot}-empty`);
    const infoEl  = document.getElementById(`opp-${slot}-info`);
    const avEl    = document.getElementById(`opp-${slot}-av`);
    const nameEl  = document.getElementById(`opp-${slot}-name`);
    const cntEl   = document.getElementById(`opp-${slot}-cnt`);

    // Remove old card backs
    Array.from(zone.querySelectorAll('.opp-card')).forEach(c => c.remove());

    if (!pid || !s.players[pid]) {
      emptyEl.style.display = 'flex';
      infoEl.style.display  = 'none';
      return;
    }

    const p = s.players[pid];
    emptyEl.style.display = 'none';
    infoEl.style.display  = 'flex';
    avEl.textContent = p.name.charAt(0).toUpperCase();
    avEl.style.background = p.color;
    avEl.className = 'opp-av' + (pid === s.turn ? ' active-turn' : '');
    nameEl.textContent = p.name;
    cntEl.textContent  = p.handCount + ' taş';

    // Draw card backs
    const count = Math.min(p.handCount, 8);
    for (let i = 0; i < count; i++) {
      const card = document.createElement('div');
      card.className = 'opp-card';
      zone.insertBefore(card, infoEl);
    }
  });
}

// ══════════════════════════════════════════════════════════
// MAKE DOMINO
// ══════════════════════════════════════════════════════════
function makeDomino(tile, onBoard, playable, selected) {
  const wrap = document.createElement('div');
  wrap.className = 'domino';
  wrap.dataset.id = tile.id;
  if (playable) wrap.classList.add('playable');
  if (selected) wrap.classList.add('selected');
  if (!playable && !onBoard) wrap.classList.add('unplayable');

  const body = document.createElement('div');
  body.className = 'tile-body';
  body.appendChild(makeFace(tile.left));
  body.appendChild(makeFace(tile.right));
  wrap.appendChild(body);
  return wrap;
}

function makeFace(num) {
  const face = document.createElement('div');
  face.className = 'face';
  (DOT_POS[num] || []).forEach(([x,y]) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.style.left = x+'%'; d.style.top = y+'%';
    face.appendChild(d);
  });
  return face;
}

// ══════════════════════════════════════════════════════════
// TOPBAR / BONEYARD / PLAYERS / SCORES
// ══════════════════════════════════════════════════════════
function renderTopbar(s) {
  const p = s.players[s.turn];
  document.getElementById('turnName').textContent = p ? (s.turn === myId ? 'Sen!' : p.name) : '—';
  document.getElementById('roundBadge').innerHTML = `<i class="fas fa-layer-group"></i> T${s.round}`;
}

function renderBoneyard(s) {
  document.getElementById('boneyardCount').textContent = s.boneyardCount;
  document.getElementById('boneyardBtn').disabled = !(s.started && s.turn === myId && s.boneyardCount > 0);
}

function renderPlayers(s) {
  const c = document.getElementById('playersContainer');
  c.innerHTML = '';
  (s.order || []).forEach(pid => {
    const p = s.players[pid]; if (!p) return;
    const item = document.createElement('div');
    item.className = 'p-item' + (pid===s.turn?' active-p':'') + (pid===myId?' me-p':'');
    item.innerHTML = `
      <div class="p-av" style="background:${p.color}">${p.name.charAt(0).toUpperCase()}</div>
      <div class="p-info">
        <div class="p-name">${p.name}${pid===myId?' <span style="color:#5dade2;font-size:.68rem">(Sen)</span>':''}</div>
        <div class="p-sub">Skor: ${s.scores[pid]||0} puan</div>
      </div>
      ${pid===s.turn?'<i class="fas fa-crown" style="color:var(--gold);font-size:.85rem"></i>':''}
      <div class="p-pill"><i class="fas fa-layer-group"></i> ${p.handCount}</div>`;
    c.appendChild(item);
  });
}

function renderScores(s) {
  const c = document.getElementById('scoresContainer');
  c.innerHTML = '';
  const sorted = Object.entries(s.scores).sort((a,b)=>b[1]-a[1]);
  sorted.forEach(([pid,score],i) => {
    const p = s.players[pid]; if (!p) return;
    const r = document.createElement('div'); r.className = 'score-row';
    r.innerHTML = `<div class="score-rank">${i+1}</div><div class="score-name">${p.name}</div><div class="score-val">${score}</div>`;
    c.appendChild(r);
  });
}

// ══════════════════════════════════════════════════════════
// CHAT
// ══════════════════════════════════════════════════════════
function openChat() {
  openOverlay('chatOverlay'); chatOpen=true; unreadChat=0; updateChatBadge();
  setTimeout(()=>{const m=document.getElementById('chatMessages');m.scrollTop=m.scrollHeight;},80);
}
function sendChat() {
  const i=document.getElementById('chatMsg');const msg=i.value.trim();
  if(!msg)return;socket.emit('chat',{msg});i.value='';
}
function appendChat(data) {
  const c=document.getElementById('chatMessages');
  const d=document.createElement('div');d.className='chat-msg';
  if(data.system){
    d.classList.add('system');
    d.innerHTML=`<span class="sys-text"><i class="fas fa-circle-info"></i> ${data.msg}</span>`;
  }else{
    const me=data.senderId===myId;if(me)d.classList.add('mine');
    d.innerHTML=`<div class="msg-avatar" style="background:${data.color}">${data.name.charAt(0).toUpperCase()}</div>
    <div class="msg-bubble">${!me?`<div class="msg-name" style="color:${data.color}">${data.name}</div>`:''}${data.msg}</div>`;
  }
  c.appendChild(d);if(chatOpen)c.scrollTop=c.scrollHeight;
}
function updateChatBadge() {
  const btn=document.getElementById('chatBtn');
  let b=btn.querySelector('.chat-badge');
  if(unreadChat>0){if(!b){b=document.createElement('div');b.className='chat-badge';btn.appendChild(b);}b.textContent=unreadChat>9?'9+':unreadChat;}
  else{if(b)b.remove();}
}

// ══════════════════════════════════════════════════════════
// OVERLAYS
// ══════════════════════════════════════════════════════════
function openOverlay(id){document.getElementById(id).classList.add('show');}
function closeOverlay(id){document.getElementById(id).classList.remove('show');if(id==='chatOverlay')chatOpen=false;}

// ══════════════════════════════════════════════════════════
// WIN
// ══════════════════════════════════════════════════════════
function showWin(winner,winnerName,scores){
  document.getElementById('winOverlay').classList.add('show');
  document.getElementById('winMsg').textContent=winner===myId?'🎉 Tebrikler, kazandınız!':`${winnerName} kazandı!`;
  const sc=document.getElementById('winScores');sc.innerHTML='';
  if(roomState){
    Object.entries(scores).forEach(([pid,score])=>{
      const p=roomState.players[pid];if(!p)return;
      const r=document.createElement('div');r.className='wrow';
      r.innerHTML=`<span>${p.name}${pid===myId?' (Sen)':''}</span><span class="wval">${score}</span>`;
      sc.appendChild(r);
    });
  }
}

// ══════════════════════════════════════════════════════════
// EFFECTS
// ══════════════════════════════════════════════════════════
function notify(msg,type='info'){
  const s=document.getElementById('notifStack');
  const el=document.createElement('div');el.className=`notif ${type}`;el.innerHTML=msg;
  s.appendChild(el);setTimeout(()=>el.remove(),3000);
}

function spawnImpact(x,y){
  // Ring
  const ring=document.createElement('div');ring.className='impact-ring';
  ring.style.left=x+'px';ring.style.top=y+'px';
  document.body.appendChild(ring);setTimeout(()=>ring.remove(),550);
  // Dust
  const dust=document.createElement('div');dust.className='dust';
  dust.style.left=x+'px';dust.style.top=(y+10)+'px';
  document.body.appendChild(dust);setTimeout(()=>dust.remove(),550);
}

function spawnConfetti(){
  const cols=['#d4a843','#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6'];
  for(let i=0;i<70;i++){
    const el=document.createElement('div');el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw';
    el.style.background=cols[Math.floor(Math.random()*cols.length)];
    el.style.animationDuration=(1.8+Math.random()*2.5)+'s';
    el.style.animationDelay=(Math.random()*.8)+'s';
    el.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),5000);
  }
}

// ══════════════════════════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(document.activeElement.id==='chatMsg')sendChat();
    if(document.activeElement.id==='nameInput')joinGame();
    if(document.activeElement.id==='roomInput')joinGame();
  }
  if(e.key==='Escape'){
    ['sideOverlay','playersOverlay','chatOverlay'].forEach(closeOverlay);
    selectedTileId=pendingTileId=null;renderHand();
  }
});
</script>
